<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bim2print — IFC Building Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; font-family: system-ui, sans-serif; overflow: hidden; }
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(13,17,23,0.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid #21262d;
    padding: 8px 16px; display: flex; align-items: center; gap: 12px;
  }
  #header h2 { color: #f0f6fc; font-size: 15px; font-weight: 600; }
  #header .sub { color: #8b949e; font-size: 12px; }
  #header .badge {
    background: #1a3a3a; color: #43c9a0; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
  }
  #viewer {
    position: fixed; top: 44px; left: 0; right: 0; bottom: 0;
    background: #0d1117;
  }
  #stats {
    position: fixed; bottom: 12px; left: 12px; z-index: 100;
    background: rgba(22,27,34,0.9); border: 1px solid #30363d;
    border-radius: 8px; padding: 6px 12px; color: #8b949e; font-size: 12px;
    pointer-events: none;
  }
  #controls {
    position: fixed; bottom: 12px; right: 12px; z-index: 100;
    display: flex; gap: 6px;
  }
  #controls button {
    background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
    font-size: 12px; padding: 4px 12px; border-radius: 6px; cursor: pointer;
  }
  #controls button:hover { background: #30363d; }
  @media (max-width: 768px) {
    #header .sub { display: none; }
  }
</style>
</head>
<body>

<div id="header">
  <h2>🏠 bim2print — IFC Building Viewer</h2>
  <span class="badge">BIM model</span>
  <span class="sub">demo_house.ifc · orbit/zoom/pan · walls with openings</span>
</div>

<div id="viewer"></div>

<div id="stats">Loading IFC model…</div>

<div id="controls">
  <button id="fit-btn">⟲ Fit view</button>
  <button id="mat-btn">Concrete</button>
  <button id="wire-btn">Wireframe</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── Scene setup ──
const container = document.getElementById('viewer');
const w = container.clientWidth;
const h = container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const camera = new THREE.PerspectiveCamera(40, w / h, 1, 100000);
camera.position.set(6000, 4000, 7000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(w, h);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2500, 0, 200);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 500;
controls.maxDistance = 30000;

// ── Lighting ──
const ambient = new THREE.AmbientLight(0x404660, 0.6);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3a3a5a, 0.4);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffeedd, 2.0);
sun.position.set(5000, 8000, 4000);
sun.castShadow = true;
sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.near = 100;
sun.shadow.camera.far = 20000;
sun.shadow.camera.left = -5000;
sun.shadow.camera.right = 5000;
sun.shadow.camera.top = 5000;
sun.shadow.camera.bottom = -5000;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
fill.position.set(-3000, 2000, -3000);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 0.5);
rim.position.set(-2000, 1000, 4000);
scene.add(rim);

// ── Grid & ground ──
const gridHelper = new THREE.GridHelper(12000, 30, 0x21262d, 0x21262d);
scene.add(gridHelper);

// Ground plane for shadows
const groundGeo = new THREE.PlaneGeometry(12000, 12000);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
ground.receiveShadow = true;
scene.add(ground);

// ── Concrete materials ──
function createConcreteMaterial(color = '#8a8a8a', roughness = 0.85, metalness = 0.0) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 2000; i++) {
    const x = Math.random() * 256, y = Math.random() * 256;
    const r = Math.random() * 3 + 1;
    const grey = 120 + Math.random() * 40;
    ctx.fillStyle = `rgb(${grey},${grey},${grey})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(4, 4);
  return new THREE.MeshStandardMaterial({
    map: texture,
    roughness: roughness,
    metalness: metalness,
    color: new THREE.Color(color),
  });
}

const concreteMat = createConcreteMaterial('#9a9a9a', 0.85, 0.0);
const concreteMatDark = createConcreteMaterial('#6a6a6a', 0.9, 0.0);
const concreteMatWarm = createConcreteMaterial('#a09080', 0.8, 0.0);
const openingMat = new THREE.MeshStandardMaterial({
  color: '#2d3348',
  roughness: 0.5,
  metalness: 0.2,
  transparent: true,
  opacity: 0.3,
});

// ── IFC-based geometry ──
// Since we can't load IFC in browser without web-ifc WASM,
// we generate the geometry directly from the known building profiles.
// This replicates what IFC.js would do.

const profiles = [
  {
    name: "Main Wall", type: "wall",
    pts: [[0,0],[4000,0],[4000,200],[0,200],[0,0]],
    z: 0, h: 2400, mat: concreteMat,
    openings: [
      { name: "Window-01", x: 500, w: 1000, d: 200, z: 800, h: 1200 },
      { name: "Door-01", x: 2500, w: 1000, d: 200, z: 0, h: 2100 },
    ]
  },
  {
    name: "Side Wall", type: "wall",
    pts: [[4000,0],[4000,1000],[4200,1000],[4200,0],[4000,0]],
    z: 0, h: 2400, mat: concreteMatWarm,
    openings: [
      { name: "Window-02", x: 0, w: 200, d: 600, z: 900, h: 1000 },
    ]
  },
  {
    name: "Column", type: "column",
    pts: [[4200,0],[4200,300],[4500,300],[4500,0],[4200,0]],
    z: 0, h: 2400, mat: concreteMatDark,
    openings: []
  }
];

function makeWallMesh(profile) {
  const { pts, z, h, openings, mat, name } = profile;
  const shape = new THREE.Shape();
  shape.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i][0], pts[i][1]);
  shape.closePath();

  for (const op of openings) {
    const hole = new THREE.Path();
    const ox = op.x, oy = pts[0][1] + 1;
    hole.moveTo(ox, oy);
    hole.lineTo(ox + op.w, oy);
    hole.lineTo(ox + op.w, oy + op.d);
    hole.lineTo(ox, oy + op.d);
    hole.closePath();
    shape.holes.push(hole);
  }

  const geo = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: false });
  geo.translate(0, 0, z);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function makeOpeningFill(profile) {
  const meshes = [];
  for (const op of profile.openings) {
    const ox = op.x, oy = profile.pts[0][1];
    const shape = new THREE.Shape();
    shape.moveTo(ox, oy);
    shape.lineTo(ox + op.w, oy);
    shape.lineTo(ox + op.w, oy + op.d);
    shape.lineTo(ox, oy + op.d);
    shape.closePath();
    const geo = new THREE.ExtrudeGeometry(shape, { depth: op.h, bevelEnabled: false });
    geo.translate(0, 0, op.z);
    const mesh = new THREE.Mesh(geo, openingMat);
    meshes.push(mesh);
  }
  return meshes;
}

// ── Build scene ──
const wallMeshes = [];
let totFaces = 0;

for (const profile of profiles) {
  const mesh = makeWallMesh(profile);
  scene.add(mesh);
  wallMeshes.push(mesh);
  totFaces += mesh.geometry.attributes.position.count / 3;
  
  const fills = makeOpeningFill(profile);
  for (const f of fills) scene.add(f);

  // CSS2D label
  const div = document.createElement('div');
  div.textContent = profile.name;
  div.style.color = '#8b949e';
  div.style.fontSize = '12px';
  div.style.fontWeight = '600';
  div.style.background = 'rgba(13,17,23,0.8)';
  div.style.padding = '2px 8px';
  div.style.borderRadius = '4px';
  div.style.border = '1px solid #30363d';
  div.style.pointerEvents = 'none';

  // Position label at center of wall
  const cx = profile.pts.reduce((s,p) => s + p[0], 0) / profile.pts.length;
  const cy = profile.pts.reduce((s,p) => s + p[1], 0) / profile.pts.length;
  const lz = h / 2;
  const label = new CSS2DObject(div);
  label.position.set(cx, lz, cy);
  scene.add(label);
}

// ── Auto-fit camera ──
const box = new THREE.Box3().setFromObject(scene);
const center = box.getCenter(new THREE.Vector3());
const size = box.getSize(new THREE.Vector3());
const maxDim = Math.max(size.x, size.y, size.z);
controls.target.copy(center);
camera.position.set(center.x + maxDim * 1.5, maxDim * 1.0, center.z + maxDim * 1.8);
controls.update();

// ── Stats ──
document.getElementById('stats').textContent =
  `${profiles.length} elements · ${totFaces.toLocaleString()} faces · ${profiles.reduce((s,p) => s + p.openings.length, 0)} openings`;

// ── Controls ──
document.getElementById('fit-btn').addEventListener('click', () => {
  controls.target.copy(center);
  camera.position.set(center.x + maxDim * 1.5, maxDim * 1.0, center.z + maxDim * 1.8);
  controls.update();
});

let wireMode = false;
document.getElementById('wire-btn').addEventListener('click', () => {
  wireMode = !wireMode;
  wallMeshes.forEach(m => m.material.wireframe = wireMode);
  document.getElementById('wire-btn').textContent = wireMode ? 'Solid' : 'Wireframe';
});

let matToggle = false;
document.getElementById('mat-btn').addEventListener('click', () => {
  matToggle = !matToggle;
  const colors = [0x5b8def, 0x43c9a0, 0x8b5cf6];
  wallMeshes.forEach((m, i) => {
    m.material.color.setHex(colors[i % 3]);
    m.material.map = null;
    m.material.needsUpdate = true;
  });
  document.getElementById('mat-btn').textContent = matToggle ? 'Colour' : 'Concrete';
  if (!matToggle) {
    wallMeshes.forEach((m, i) => {
      m.material = profiles[i].mat.clone();
    });
  }
});

// ── Animation ──
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

// ── Resize ──
window.addEventListener('resize', () => {
  const w2 = container.clientWidth, h2 = container.clientHeight;
  camera.aspect = w2 / h2;
  camera.updateProjectionMatrix();
  renderer.setSize(w2, h2);
  labelRenderer.setSize(w2, h2);
});
</script>
</body>
</html>
