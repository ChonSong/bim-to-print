// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 100000);
camera.position.set(3000, 2500, 4000);
camera.lookAt(1500, 0, 100);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(1500, 0, 150);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.1;

// Grid + axes
const gridHelper = new THREE.GridHelper(4000, 20, 0x21262d, 0x21262d);
gridHelper.position.y = 0;
scene.add(gridHelper);

const axesHelper = new THREE.AxesHelper(500);
scene.add(axesHelper);

// Ambient + directional
const ambient = new THREE.AmbientLight(0x404660);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(2000, 5000, 3000);
scene.add(dirLight);

// Build all layers as line groups
const layerLines = [];
let allPoints = [];

layerData.forEach((ld, idx) => {
  const pts = ld.pts;
  if (pts.length < 4) return;
  const color = LAYER_COLORS[idx % LAYER_COLORS.length];
  const z = ld.z;

  const positions = [];
  for (let i = 0; i < pts.length; i += 2) {
    positions.push(pts[i], z, pts[i+1]);
  }
  if (positions.length < 6) return;

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.3 });
  const line = new THREE.Line(geometry, material);
  line.visible = false;
  scene.add(line);
  layerLines.push({ line, material, z });
  allPoints.push(...positions);
});

if (allPoints.length > 0) {
  // compute bounds
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  for (let i=0; i<allPoints.length; i+=3) {
    minX=Math.min(minX,allPoints[i]); maxX=Math.max(maxX,allPoints[i]);
    minZ=Math.min(minZ,allPoints[i+2]); maxZ=Math.max(maxZ,allPoints[i+2]);
  }
}

// Sort layers by z
layerLines.sort((a,b) => a.z - b.z);

// Layer indicator
const layerLabel = document.getElementById('layer-label');

let currentLayerIdx = 0;
let isPlaying = false;
let playTimer = null;

function showLayer(idx) {
  layerLines.forEach((l, i) => {
    if (i <= idx) {
      l.line.visible = true;
      l.material.opacity = (i === idx) ? 1.0 : 0.3;
    } else {
      l.line.visible = false;
    }
  });
  const z = layerLines[idx]?.z ?? 0;
  layerLabel.textContent = `layer ${idx+1}/${layerLines.length} · Z=${z.toFixed(1)}mm`;
  currentLayerIdx = idx;
}

function resetView() {
  camera.position.set(3000, 2500, 4000);
  controls.target.set(1500, 0, 150);
  controls.update();
  showLayer(0);
}

// Initial
showLayer(0);

// Play button
document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) {
    isPlaying = false;
    clearInterval(playTimer);
    document.getElementById('play-btn').textContent = '▶ Play';
    return;
  }
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸ Pause';
  showLayer(0);
  let i = 0;
  playTimer = setInterval(() => {
    i++;
    showLayer(i);
    if (i >= layerLines.length - 1) {
      clearInterval(playTimer);
      isPlaying = false;
      document.getElementById('play-btn').textContent = '▶ Play';
    }
  }, 60);
});

document.getElementById('reset-btn').addEventListener('click', resetView);

// Scroll through layers with mouse wheel
renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (isPlaying) return;
  let idx = currentLayerIdx + (e.deltaY > 0 ? 1 : -1);
  idx = Math.max(0, Math.min(layerLines.length-1, idx));
  showLayer(idx);
}, { passive: false });

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>
